auth_enabled: false

server:
  http_listen_port: 3100

# Run single-node dev ring (no Consul) so Loki doesn't try to contact localhost:8500

common:
  path_prefix: /tmp/loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2026-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /tmp/loki/index
    cache_location: /tmp/loki/cache

  # Moved here and properly indented under storage_config
  filesystem:
    directory: /tmp/loki/chunks

limits_config:
  allow_structured_metadata: false
